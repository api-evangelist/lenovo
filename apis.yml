apis:
  - aid: lenovo:lenovo-xclarity-administrator-rest-api
    name: Lenovo XClarity Administrator REST API
    description: >-
      The Lenovo XClarity Administrator REST API provides programmatic access
      to XClarity Administrator data and services from applications running
      outside of the XClarity Administrator framework. It supports managing
      Lenovo servers, storage, and switches, including inventory, firmware
      updates, configuration patterns, events, and OS deployment, and is
      complemented by PowerShell, Python, and Ruby toolkits.
    humanURL: https://pubs.lenovo.com/lxca_scripting/

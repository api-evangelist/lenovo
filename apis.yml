aid: lenovo
name: Lenovo
description: >-
  Lenovo Group is a Chinese multinational technology company and one of the
  world's largest personal computer vendors by unit sales. Lenovo designs,
  manufactures, and sells PCs, tablets, smartphones, workstations, servers,
  storage, and data center infrastructure solutions globally. Lenovo exposes a
  REST API for its XClarity Administrator data center management platform and
  publishes open-source projects through its GitHub organization, but does not
  operate a general-purpose consumer or partner developer portal.
